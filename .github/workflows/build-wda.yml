name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Import certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp123" build.keychain

      - name: Install provisioning profile
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/c896bc27-ac17-484d-9b2c-73f0d2d554ac.mobileprovision

      - name: Bootstrap WDA
        run: |
          cd Scripts && bash bootstrap.sh -d 2>&1 | tail -20

      - name: Patch project signing
        run: |
          python3 - <<'PYEOF'
          import re, sys
          path = "WebDriverAgent.xcodeproj/project.pbxproj"
          content = open(path).read()
          # Force WebDriverAgentLib to use Automatic signing (no profile needed)
          content = re.sub(
            r'(WebDriverAgentLib[^}]*?)(CODE_SIGN_STYLE\s*=\s*\w+;)',
            r'\1CODE_SIGN_STYLE = Automatic;',
            content, flags=re.DOTALL
          )
          open(path, 'w').write(content)
          print("Patched project.pbxproj")
          PYEOF

      - name: Build WDA IPA
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -derivedDataPath /tmp/wda-build \
            DEVELOPMENT_TEAM=34AG2D92DC \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="c896bc27-ac17-484d-9b2c-73f0d2d554ac" \
            PROVISIONING_PROFILE_SPECIFIER="wuguangan-iPhonex" \
            2>&1 | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED|Signing" | tail -20

      - name: Package IPA
        run: |
          echo "=== Build output ==="
          find /tmp/wda-build -name "*.app" 2>/dev/null
          APP_PATH=$(find /tmp/wda-build -name "*.app" -not -path "*/Plugins/*" | head -1)
          echo "Using: $APP_PATH"
          mkdir -p /tmp/ipa/Payload
          cp -r "$APP_PATH" /tmp/ipa/Payload/
          cd /tmp/ipa && zip -r /tmp/WebDriverAgent.ipa Payload/
          ls -lh /tmp/WebDriverAgent.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: /tmp/WebDriverAgent.ipa
          retention-days: 7
